<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Catalogador | Precisión 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="bg-gray-100 p-4 md:p-10 font-sans text-gray-800">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl border-t-4 border-black overflow-hidden">
        
        <div class="bg-black text-white p-6">
            <h1 class="text-3xl font-bold uppercase italic tracking-tighter">Honda Part Intel</h1>
            <p class="text-xs opacity-90 font-bold tracking-widest uppercase text-red-500">Motor de Temperatura 0.1 (Anti-Alucinación)</p>
        </div>

        <div class="p-6 space-y-6">
            
            <div class="bg-gray-50 p-4 rounded border border-gray-200">
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">1. API Key:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-3 border border-gray-300 rounded focus:border-black outline-none text-sm font-mono">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">2. Código Original Honda:</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="partInput" placeholder="Ej: 51490-KAZ-003 o 51490-MN8" class="flex-1 p-4 border-2 border-gray-300 rounded text-xl font-bold uppercase focus:border-red-600 outline-none">
                    <button id="mainBtn" onclick="procesar()" class="bg-red-600 text-white px-8 py-4 rounded font-bold uppercase hover:bg-red-700 transition disabled:bg-gray-400">
                        Generar Ficha
                    </button>
                </div>
            </div>

            <div id="statusBox" class="hidden p-4 rounded text-sm font-bold text-center border"></div>

            <div id="resultBox" class="hidden">
                <textarea id="output" rows="25" class="w-full p-5 bg-gray-50 border border-gray-300 rounded font-mono text-sm outline-none shadow-inner leading-relaxed"></textarea>
                <button onclick="copiar()" class="mt-4 w-full bg-blue-600 text-white py-4 rounded font-bold uppercase hover:bg-blue-800 transition shadow-lg">
                    📋 Copiar para Mercado Libre
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        document.getElementById('apiKey').value = localStorage.getItem('honda_final_key') || '';

        window.procesar = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const part = document.getElementById('partInput').value.trim();
            
            if(!key) return alert("Falta la API Key.");
            if(part.length < 5) return alert("Código inválido.");

            localStorage.setItem('honda_final_key', key);

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');
            const result = document.getElementById('resultBox');
            const output = document.getElementById('output');

            btn.disabled = true;
            result.classList.add('hidden');
            status.classList.remove('hidden', 'bg-red-50', 'text-red-700');
            status.classList.add('bg-blue-50', 'text-blue-700');
            status.innerText = "Procesando...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                const selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                const cleanModelName = selectedModel.name.replace('models/', '');

                const genAI = new GoogleGenerativeAI(key);
                
                // AQUÍ ESTÁ LA SOLUCIÓN TÉCNICA: Temperatura casi en 0 para forzar datos reales.
                const model = genAI.getGenerativeModel({ 
                    model: cleanModelName,
                    generationConfig: {
                        temperature: 0.1, 
                        topP: 0.8,
                        topK: 10
                    }
                });
                
                const prompt = `Actúa como un experto en repuestos OEM de motocicletas. Analiza el código Honda: ${part}.
                
                REGLA ABSOLUTA: Prioriza la PRECISIÓN sobre la cantidad. Solo lista datos de los que tengas certeza absoluta. Si no conoces una medida exacta o un modelo, NO LO INVENTES.
                
                1. Completa el código original si tiene menos de 10 dígitos.
                2. Identifica si hay un reemplazo oficial (Supersession).
                3. Lista los modelos compatibles. Los años DEBEN usar guiones (ej: 2000-2015), nunca comas.
                4. Identifica reemplazos físicos (otras piezas Honda con las mismas medidas) y compatibilidad con otras marcas si tienes certeza del dato.

                DEVUELVE EXCLUSIVAMENTE ESTE FORMATO:
                [NOMBRE DEL ARTÍCULO EN MAYÚSCULAS]
                [MODELOS COMERCIALES ARG/BRA]
                [DETALLE DEL CONTENIDO] - ORIGINAL HONDA
                HONDA ORIGINAL

                --- DATOS DE LA PIEZA ---
                CÓDIGO: [Código completo]
                MEDIDAS: [Solo si aplica, ej: 37x50x11mm]
                REEMPLAZO OFICIAL: [Código nuevo o "No registra"]

                --- APLICACIÓN HONDA ---
                PARA: [Modelo verificado]
                AÑOS: [Año]-[Año]
                (Repetir para los modelos comprobados)

                --- REEMPLAZOS FÍSICOS HONDA ---
                [Código] | [Medida] | [Modelo de origen]

                --- COMPATIBILIDAD OTRAS MARCAS ---
                MARCA: [Marca] | MODELO: [Modelo] | AÑOS: [Rango]
                CÓDIGO OEM: [Código de la otra marca si se conoce]`;

                const res = await model.generateContent(prompt);
                output.value = res.response.text();
                status.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                status.classList.remove('bg-blue-50', 'text-blue-700');
                status.classList.add('bg-red-50', 'text-red-700');
                status.innerHTML = "<b>Error:</b> " + err.message;
            } finally {
                btn.disabled = false;
            }
        };

        window.copiar = () => {
            const out = document.getElementById("output");
            out.select();
            document.execCommand("copy");
            alert("¡Copiado!");
        };
    </script>
</body>
</html>
