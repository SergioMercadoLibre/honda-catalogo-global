<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Global Cataloger Pro v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="bg-slate-900 p-4 md:p-8 font-sans text-slate-200 text-left">

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl shadow-2xl border-t-4 border-red-600 overflow-hidden">
        
        <div class="bg-red-600 text-white p-8">
            <h1 class="text-4xl font-bold uppercase italic tracking-tighter text-left">Honda Part Intel Pro v4</h1>
            <p class="text-xs opacity-90 font-bold tracking-[0.3em] uppercase mt-2 text-left">Motor de Verificación Técnica y Validación de Diámetros</p>
        </div>

        <div class="p-8 space-y-8">
            
            <div class="bg-slate-700 p-5 rounded-xl border border-slate-600">
                <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest text-left text-left">Llave API de Google:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-600 p-3 rounded-lg text-white text-sm focus:border-red-500 outline-none">
            </div>

            <div class="text-left">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase italic text-left">Ingresar Código Honda (9 o 11 dígitos):</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="text" id="partInput" placeholder="Ej: 51490-KAZ-003" class="flex-1 bg-slate-900 border-2 border-slate-700 p-5 rounded-2xl text-2xl font-bold uppercase tracking-widest text-white focus:border-red-500 transition-all outline-none">
                    <button id="mainBtn" onclick="procesar()" class="bg-red-600 text-white px-12 py-5 rounded-2xl font-bold text-xl uppercase tracking-tighter italic hover:bg-red-700 transition shadow-xl active:scale-95">
                        Analizar Repuesto
                    </button>
                </div>
            </div>

            <div id="statusBox" class="hidden p-5 rounded-xl text-sm font-bold text-center border-2"></div>

            <div id="resultBox" class="hidden animate-in fade-in slide-in-from-bottom duration-700">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-red-500 uppercase tracking-widest italic text-left">Publicación Profesional Verificada</span>
                    <button onclick="copiar()" class="text-[10px] bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded-full font-bold uppercase transition text-white">Copiar para Mercado Libre</button>
                </div>
                <textarea id="output" rows="30" class="w-full bg-slate-900 border border-slate-700 p-8 rounded-3xl text-sm font-mono text-slate-300 leading-relaxed shadow-2xl focus:outline-none"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        document.getElementById('apiKey').value = localStorage.getItem('honda_v4_key') || '';

        window.procesar = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const part = document.getElementById('partInput').value.trim();
            
            if(!key) return alert("Falta la API Key.");
            if(part.length < 5) return alert("Código demasiado corto.");

            localStorage.setItem('honda_v4_key', key);

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');
            const result = document.getElementById('resultBox');
            const output = document.getElementById('output');

            btn.disabled = true;
            result.classList.add('hidden');
            status.classList.remove('hidden', 'bg-red-900/20', 'text-red-400', 'border-red-500/50');
            status.classList.add('bg-blue-900/20', 'text-blue-400', 'border-blue-500/50');
            
            try {
                status.innerText = "Validando motor de inteligencia artificial...";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                const selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                const cleanModelName = selectedModel.name.replace('models/', '');

                status.innerText = "Ejecutando protocolo de validación de dimensiones y compatibilidad...";

                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: cleanModelName });
                
                const prompt = `ERES UN INGENIERO SENIOR DE REPUESTOS HONDA. TU MISIÓN ES LA PRECISIÓN ABSOLUTA.
                CÓDIGO: "${part}". 

                PASOS OBLIGATORIOS ANTES DE RESPONDER:
                1. IDENTIFICA LA PIEZA: Determina exactamente qué es (Kit de retenes, tornillo, tapón, etc.).
                2. DETERMINA DIÁMETRO: Si es un retén, identifica el diámetro del barral (Ej: KAZ=37mm, MN8=41mm, MJP/MY9=43mm). 
                3. FILTRO CRÍTICO: SOLO puedes listar motos que usen EXACTAMENTE ese diámetro. Está TERMINANTEMENTE PROHIBIDO listar una XR 600 (43mm) si el código es KAZ (37mm).
                4. FORMATEO: Años con guion (Ej: 2000-2015). Bloques PARA/AÑOS individuales.

                ESTRUCTURA DE RESPUESTA REQUERIDA (NO AGREGAR INTRODUCCIONES):
                [NOMBRE DEL ARTÍCULO EN MAYÚSCULAS]
                [MODELOS MÁS COMERCIALES PARA ARG/BRA]
                [DETALLE DEL CONTENIDO] - CALIDAD ORIGINAL HONDA
                HONDA ORIGINAL

                --- DATOS TÉCNICOS VERIFICADOS ---
                CÓDIGO ORIGINAL: [Completar a 11 dígitos]
                MEDIDAS FÍSICAS: [Interior x Exterior x Altura] (Ej: 37x50x11mm).
                DIÁMETRO DE BARRAL: [Ej: 37mm]

                --- COMPATIBILIDAD HONDA (SOLO MOTOS QUE USAN ESTE DIÁMETRO) ---
                PARA: [Modelo]
                AÑOS: [Rango inicial]-[Rango final]
                (Listar todas las motos de manual sin errores)

                --- REEMPLAZOS FÍSICOS HONDA ---
                (Otros códigos de Honda con las mismas medidas exactas)
                CÓDIGO: [Código] | MEDIDAS: [Confirmar]

                --- COMPATIBILIDAD OTRAS MARCAS (MISMA MEDIDA FÍSICA) ---
                MARCA: [Marca] | MODELO: [Modelo] | AÑOS: [Rango]
                CÓDIGO OEM: [Código]`;

                const res = await model.generateContent(prompt);
                output.value = res.response.text();
                status.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                status.classList.remove('bg-blue-900/20', 'text-blue-400', 'border-blue-500/50');
                status.classList.add('bg-red-900/20', 'text-red-400', 'border-red-500/50');
                status.innerHTML = "<b>Falla Crítica:</b> " + err.message;
            } finally {
                btn.disabled = false;
            }
        };

        window.copyToClipboard = () => {
            const out = document.getElementById("output");
            out.select();
            document.execCommand("copy");
            alert("Publicación copiada al portapapeles.");
        };
    </script>
</body>
</html>
