<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Global Cataloger Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="bg-slate-900 p-4 md:p-8 font-sans text-slate-200">

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl shadow-2xl border-t-4 border-red-600 overflow-hidden">
        
        <div class="bg-red-600 text-white p-8">
            <h1 class="text-4xl font-bold uppercase italic tracking-tighter">Honda Part Intel Pro v3</h1>
            <p class="text-xs opacity-90 font-bold tracking-[0.3em] uppercase mt-2">Control Estricto de Medidas (IntxExtxEsp) y Anti-Alucinación</p>
        </div>

        <div class="p-8 space-y-8">
            
            <div class="bg-slate-700 p-5 rounded-xl border border-slate-600">
                <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest text-left">Acceso API Key:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-600 p-3 rounded-lg text-white text-sm focus:border-red-500 outline-none">
            </div>

            <div class="text-left">
                <label class="block text-sm font-bold text-slate-300 mb-3 uppercase italic text-left">Ingresar Código Original Honda:</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="text" id="partInput" placeholder="Ej: 51490-KAZ-003" class="flex-1 bg-slate-900 border-2 border-slate-700 p-5 rounded-2xl text-2xl font-bold uppercase tracking-widest text-white focus:border-red-500 transition-all outline-none">
                    <button id="mainBtn" onclick="procesar()" class="bg-red-600 text-white px-12 py-5 rounded-2xl font-bold text-xl uppercase tracking-tighter italic hover:bg-red-700 transition shadow-xl active:scale-95">
                        Analizar Repuesto
                    </button>
                </div>
            </div>

            <div id="statusBox" class="hidden p-5 rounded-xl text-sm font-bold text-center border-2"></div>

            <div id="resultBox" class="hidden animate-in fade-in slide-in-from-bottom duration-700">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-red-500 uppercase tracking-widest italic">Reporte Técnico Generado</span>
                    <button onclick="copiar()" class="text-[10px] bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded-full font-bold uppercase transition text-white">Copiar Todo</button>
                </div>
                <textarea id="output" rows="30" class="w-full bg-slate-900 border border-slate-700 p-8 rounded-3xl text-sm font-mono text-slate-300 leading-relaxed shadow-2xl focus:outline-none"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        document.getElementById('apiKey').value = localStorage.getItem('honda_v3_key') || '';

        window.procesar = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const part = document.getElementById('partInput').value.trim();
            
            if(!key) return alert("Falta la API Key.");
            if(part.length < 5) return alert("Código demasiado corto.");

            localStorage.setItem('honda_v3_key', key);

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');
            const result = document.getElementById('resultBox');
            const output = document.getElementById('output');

            btn.disabled = true;
            result.classList.add('hidden');
            status.classList.remove('hidden', 'bg-red-900/20', 'text-red-400', 'border-red-500/50');
            status.classList.add('bg-blue-900/20', 'text-blue-400', 'border-blue-500/50');
            
            try {
                status.innerText = "Accediendo a bases de datos y forzando verificación cruzada...";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                const selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                const cleanModelName = selectedModel.name.replace('models/', '');

                status.innerText = "Extrayendo medidas completas y listados verificados de manual...";

                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: cleanModelName });
                
                // NUEVO CEREBRO: REGLAS ANTI-ALUCINACIÓN Y DIMENSIONES COMPLETAS
                const prompt = `ERES UN INGENIERO DE REPUESTOS HONDA BAJO ESTRICTO CONTROL DE CALIDAD.
                CÓDIGO A ANALIZAR: "${part}". (Si son 9 dígitos, completa la terminación original).

                REGLAS DE ORO (INCUMPLIRLAS ES FATAL):
                1. PROHIBIDO ADIVINAR: Si no tienes certeza absoluta del dato en catálogos oficiales (Partzilla, CMSNL), escribe "DATO NO VERIFICABLE" en lugar de inventar motos o medidas erróneas.
                2. MEDIDAS COMPLETAS OBLIGATORIAS: Si es un retén, rodamiento, junta u o-ring, DEBES dar TODAS las dimensiones en formato: [Diámetro Interior] x [Diámetro Exterior] x [Altura/Espesor] (Ejemplo: 37x50x11mm). JAMÁS des solo una medida aislada (como "barral de 43mm").
                3. MOTOS CORRECTAS: Lista solo las motos reales de manual. (Ej: 51490-KAZ-003 aplica a CBX 250 Twister, NX250, CB500, etc. No inventes).
                4. AÑOS: Separados SIEMPRE por guion (ej: 2000-2008).

                ESTRUCTURA DE TU RESPUESTA:
                [NOMBRE DEL ARTÍCULO EN MAYÚSCULAS]
                [MODELOS COMERCIALES ARG/BRA]
                [QUÉ INCLUYE] - CALIDAD ORIGINAL HONDA
                HONDA ORIGINAL

                --- CÓDIGO Y MEDIDAS TÉCNICAS ---
                CÓDIGO ORIGINAL: [Código oficial completo]
                MEDIDAS EXACTAS: [Interior x Exterior x Espesor] (Ej: 37x50x11mm. Si es una pieza compleja sin medida de x/y/z, decríbela técnicamente).

                --- REEMPLAZO OFICIAL HONDA ---
                CÓDIGO: [Indicar supersession o "No posee reemplazo oficial"]

                --- LISTADO DE APLICACIÓN (HONDA) ---
                PARA: [Modelo Verificado]
                AÑOS: [Año]-[Año]
                (Repetir para todos los modelos reales sin omitir ni inventar)

                --- REEMPLAZOS FÍSICOS (POR DIMENSIONES IDÉNTICAS) ---
                CÓDIGO: [Código de otra pieza Honda que tenga exactamente las mismas medidas]
                MEDIDAS: [Confirmar las 3 medidas de este reemplazo]
                APLICA EN: [Modelos]

                --- COMPATIBILIDAD OTRAS MARCAS ---
                (Motos Yamaha, Kawa, Suzuki, BMW, etc. que usen las mismas dimensiones)
                MARCA: [Marca] | MODELO: [Modelo] | AÑOS: [Rango]
                CÓDIGO OEM: [Código de la otra marca]
                MEDIDAS VERIFICADAS: [Confirmar que comparte las medidas exactas]`;

                const res = await model.generateContent(prompt);
                output.value = res.response.text();
                status.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                status.classList.remove('bg-blue-900/20', 'text-blue-400', 'border-blue-500/50');
                status.classList.add('bg-red-900/20', 'text-red-400', 'border-red-500/50');
                status.innerHTML = "<b>Falla de Sistema:</b> " + err.message;
            } finally {
                btn.disabled = false;
            }
        };

        window.copiar = () => {
            const out = document.getElementById("output");
            out.select();
            document.execCommand("copy");
            alert("Reporte copiado.");
        };
    </script>
</body>
</html>
