<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Catalogador | Inteligencia de Mercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="bg-slate-100 p-4 md:p-10 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-2xl border-t-8 border-red-600 overflow-hidden">
        
        <div class="bg-slate-900 text-white p-8">
            <h1 class="text-4xl font-bold uppercase italic tracking-tighter">Honda Part Intel Pro</h1>
            <p class="text-xs opacity-90 font-bold tracking-widest uppercase text-red-500 mt-2">Módulo Dual: Publicación ML + Panel de Datos Internos (Privado)</p>
        </div>

        <div class="p-8 space-y-8">
            
            <div class="bg-slate-50 p-5 rounded border border-slate-200">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">1. Credencial de Acceso (API Key):</label>
                <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-3 border border-slate-300 rounded focus:border-red-600 outline-none text-sm font-mono shadow-inner">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">2. Búsqueda Maestra (Código Original Honda):</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="partInput" placeholder="Ej: 51490-MN8" class="flex-1 p-5 border-2 border-slate-300 rounded text-2xl font-bold uppercase focus:border-red-600 outline-none shadow-inner">
                    <button id="mainBtn" onclick="procesar()" class="bg-red-600 text-white px-10 py-5 rounded font-bold text-lg uppercase hover:bg-red-700 transition shadow-lg disabled:bg-slate-400">
                        Generar Reporte Dual
                    </button>
                </div>
            </div>

            <div id="statusBox" class="hidden p-4 rounded text-sm font-bold text-center border"></div>

            <div id="resultBox" class="hidden animate-in fade-in duration-500">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase">Reporte Generado (Separación Pública / Privada):</label>
                    <button onclick="copiar()" class="bg-slate-800 text-white px-4 py-2 rounded text-xs font-bold uppercase hover:bg-slate-700 transition">
                        📋 Copiar Todo
                    </button>
                </div>
                <textarea id="output" rows="35" class="w-full p-6 bg-slate-50 border-2 border-slate-200 rounded-xl font-mono text-sm outline-none shadow-inner leading-relaxed"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        document.getElementById('apiKey').value = localStorage.getItem('honda_final_v6') || '';

        window.procesar = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const part = document.getElementById('partInput').value.trim();
            
            if(!key) return alert("Falta la API Key.");
            if(part.length < 5) return alert("Código inválido.");

            localStorage.setItem('honda_final_v6', key);

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');
            const result = document.getElementById('resultBox');
            const output = document.getElementById('output');

            btn.disabled = true;
            result.classList.add('hidden');
            status.classList.remove('hidden', 'bg-red-50', 'text-red-700');
            status.classList.add('bg-blue-50', 'text-blue-700');
            status.innerText = "Conectando a Google Search... Buscando catálogos LATAM y Globales en tiempo real...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                const selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                const cleanModelName = selectedModel.name.replace('models/', '');

                const genAI = new GoogleGenerativeAI(key);
                
                // EL CAMBIO VITAL: Activamos Google Search Grounding para que no adivine.
                const model = genAI.getGenerativeModel({ 
                    model: cleanModelName,
                    tools: [{ googleSearch: {} }], // <- ESTO OBLIGA A BUSCAR EN INTERNET
                    generationConfig: { temperature: 0.1 } 
                });
                
                const prompt = `Actúa como un sistema de inteligencia de repuestos Honda.
                ESTÁS OBLIGADO A USAR LA BÚSQUEDA DE GOOGLE PARA VERIFICAR ESTA INFORMACIÓN AHORA MISMO.
                CÓDIGO DE BÚSQUEDA: "${part}"

                REGLAS ESTRICTAS DE BÚSQUEDA WEB:
                1. VERIFICACIÓN DE DIÁMETRO: Busca la medida exacta de la pieza. Si es el retén 51490-MN8, VERIFICA en la web que es de 41mm. Si es 41mm, ESTÁ PROHIBIDO listar motos con barrales de 43mm (como la XR 600).
                2. MERCADO LATAM OBLIGATORIO: Busca expresamente aplicaciones para Sudamérica (Brasil/Argentina). Asegúrate de incluir modelos como NX 400 Falcon, CBX 250 Twister, etc., si corresponden al diámetro y código oficial.
                3. SEPARACIÓN PÚBLICA/PRIVADA: Divide la respuesta como en el molde.
                4. AÑOS: Siempre usa guion (Ej: 1998-2005). NUNCA comas.

                MOLDE DE RESPUESTA OBLIGATORIO (No agregues nada fuera de este molde):

                ======================================================
                [PUBLICACIÓN PARA MERCADO LIBRE / CLIENTES]
                ======================================================
                [NOMBRE DEL ARTÍCULO EN MAYÚSCULAS]
                [MODELOS MÁS COMERCIALES PARA ARGENTINA Y MOTOS DE LOS 90'S EN CASO DE APLICAR]
                [DETALLE DE QUÉ INCLUYE (JUEGO, UNIDAD O KIT)] - CALIDAD ORIGINAL HONDA
                HONDA ORIGINAL

                --- APLICACIÓN OFICIAL HONDA ---
                PARA: [Modelo de Moto Verificado por Google Search]
                AÑOS: [Año]-[Año]
                (Repetir para motos globales y LATAM comprobadas)


                ======================================================
                [USO INTERNO - DATOS PRIVADOS Y ALTERNATIVAS]
                ======================================================
                --- DATOS TÉCNICOS Y CÓDIGOS ---
                CÓDIGO ORIGINAL: [Código completo de 10 u 11 dígitos]
                MEDIDAS EXACTAS: [Interior x Exterior x Espesor/Altura, si aplica]
                REEMPLAZOS OFICIALES: [Código actualizado si Honda lo reemplazó, o "No registra"]

                --- REEMPLAZOS FÍSICOS HONDA (OTRAS ALTERNATIVAS) ---
                CÓDIGO: [Código Alternativo Honda comprobado en foros/web] | MEDIDA: [Medida]

                --- OTRAS MARCAS (ALTERNATIVA DE CALIDAD HONDA) ---
                MARCA: [Ej: Yamaha / Kawasaki / BMW]
                CÓDIGO OEM: [Código original de esa marca comprobado en web]
                MEDIDA COMPROBADA: [Medida exacta compartida]
                PARA: [Modelo de la otra marca]
                AÑOS: [Año]-[Año]

                💡 TIPS DE VENTA PROFESIONAL
                - [Dato técnico, nombres en otros mercados o resistencia]`;

                const res = await model.generateContent(prompt);
                output.value = res.response.text();
                status.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                status.classList.remove('bg-blue-50', 'text-blue-700');
                status.classList.add('bg-red-50', 'text-red-700');
                status.innerHTML = "<b>Error:</b> " + err.message;
            } finally {
                btn.disabled = false;
                status.innerText = "Procesando...";
            }
        };

        window.copiar = () => {
            const out = document.getElementById("output");
            out.select();
            document.execCommand("copy");
            alert("¡Reporte completo copiado al portapapeles!");
        };
    </script>
