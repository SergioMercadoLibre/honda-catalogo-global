<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Global Cataloger | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl border-t-4 border-red-600 overflow-hidden">
        
        <div class="bg-red-600 text-white p-6">
            <h1 class="text-3xl font-bold uppercase italic tracking-tighter">Honda Global Cataloger</h1>
            <p class="text-xs opacity-90 font-bold tracking-widest uppercase">Base de Datos: LATAM | USA | EUROPA | ASIA</p>
        </div>

        <div class="p-6 space-y-6">
            
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">1. Credencial API (Se guarda automáticamente):</label>
                <input type="password" id="apiKey" placeholder="Pega tu API Key AIzaSy..." class="w-full p-3 border border-gray-300 rounded focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none text-sm font-mono">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">2. Código Original Honda (Base 9 dígitos o completo):</label>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="partInput" placeholder="Ej: 51490-MN8" class="flex-1 p-4 border-2 border-gray-300 rounded-lg text-xl font-bold uppercase focus:border-red-600 outline-none">
                    <button id="mainBtn" onclick="procesar()" class="bg-black text-white px-8 py-4 rounded-lg font-bold uppercase hover:bg-gray-800 transition disabled:bg-gray-400 shadow-md">
                        Analizar Repuesto
                    </button>
                </div>
            </div>

            <div id="statusBox" class="hidden p-4 rounded-lg text-sm font-bold text-center border"></div>

            <div id="resultBox" class="hidden animate-in fade-in duration-500">
                <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">Ficha Técnica y Publicación para ML:</label>
                <textarea id="output" rows="25" class="w-full p-5 bg-gray-50 border border-gray-300 rounded-lg font-mono text-sm outline-none shadow-inner leading-relaxed"></textarea>
                <button onclick="copiar()" class="mt-4 w-full bg-red-600 text-white py-4 rounded-lg font-bold uppercase hover:bg-red-700 transition shadow-lg flex justify-center items-center gap-2">
                    📋 Copiar Formato Listo
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Recuperar llave guardada
        document.getElementById('apiKey').value = localStorage.getItem('honda_global_key') || '';

        window.procesar = async () => {
            const key = document.getElementById('apiKey').value.trim();
            const part = document.getElementById('partInput').value.trim();
            
            if(!key) return alert("Error: Debes ingresar tu API Key.");
            if(part.length < 5) return alert("Error: El código ingresado es demasiado corto.");

            localStorage.setItem('honda_global_key', key);

            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');
            const result = document.getElementById('resultBox');
            const output = document.getElementById('output');

            btn.disabled = true;
            result.classList.add('hidden');
            status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200');
            status.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-200');
            
            try {
                status.innerText = "Sincronizando con servidores y descubriendo motor compatible...";
                
                // RUTINA AUTO-DESCUBRIMIENTO (Evita errores 404)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                const selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                const cleanModelName = selectedModel.name.replace('models/', '');

                status.innerText = `Motor ${cleanModelName} en línea. Analizando mercados (LATAM, USA, EU, ASIA)...`;

                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: cleanModelName });
                
                // PROMPT ARQUITECTÓNICO MAESTRO CON "FEW-SHOT" Y REGLAS ABSOLUTAS
                const prompt = `Actúas como un Ingeniero de Datos de Honda Global. Tu objetivo es generar descripciones impecables para Mercado Libre Argentina cruzando bases de datos de Honda LATAM, USA, Europa y Asia.

                REGLAS CRÍTICAS DEL SISTEMA (DE CUMPLIMIENTO OBLIGATORIO):
                1. FORMATO DE AÑOS: Utiliza EXCLUSIVAMENTE guiones (-). Prohibido usar comas (,). Ejemplo: 2002-2015.
                2. EXHAUSTIVIDAD: Muestra TODOS los modelos globales que aplican a la pieza. NO RESUMAS.
                3. PRECISIÓN: Completa códigos de 9 dígitos a su versión final. Identifica si hay Supersession (reemplazo oficial). No inventes medidas ni características.

                MOLDE DE RESPUESTA ESPERADA (Usa este ejemplo como tu único estándar de calidad):
                --- INICIO DEL MOLDE ---
                RETENES DE BARRAL Y GUARDAPOLVOS ORIGINALES
                NX 400 FALCON / NC 700 750 / SHADOW 750 1100 / VTX 1300
                JUEGO DE RETENES DE BARRAL Y GUARDAPOLVOS (PARA AMBOS BARRALES)
                HONDA ORIGINAL

                --- CÓDIGO ORIGINAL HONDA ---
                CÓDIGO: 51490-MN8-305
                PARA: NX 400 FALCON
                AÑOS: 2000-2015
                PARA: CB 600 F HORNET / 599 (USA)
                AÑOS: 1998-2013
                PARA: VT 750 SHADOW (TODAS LAS VERSIONES)
                AÑOS: 1998-2024

                --- REEMPLAZO OFICIAL HONDA ---
                CÓDIGO: No registra reemplazo oficial.

                --- COMPATIBILIDAD FÍSICA HONDA ---
                Compatible físicamente con barrales Showa de 41mm utilizados en modelos equivalentes.

                --- COMPATIBILIDAD CON OTRAS MARCAS (PUBLICACIÓN ALTERNATIVA) ---
                MARCA: BMW
                CÓDIGO OEM: 31427650640
                PARA: F650 GS / Dakar
                AÑOS: 2000-2007
                --- FIN DEL MOLDE ---

                AHORA, EJECUTA LA CONSULTA PARA EL SIGUIENTE CÓDIGO:
                Código a analizar: "${part}"
                
                Genera la respuesta completa aplicando el Molde, las Reglas Críticas y buscando en todos los mercados.`;

                const res = await model.generateContent(prompt);
                
                output.value = res.response.text();
                status.classList.add('hidden');
                result.classList.remove('hidden');

            } catch (err) {
                status.classList.remove('bg-blue-50', 'text-blue-700', 'border-blue-200');
                status.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
                status.innerHTML = "<b>Falla del Sistema:</b> " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Analizar Repuesto";
            }
        };

        window.copiar = () => {
            const out = document.getElementById("output");
            out.select();
            document.execCommand("copy");
            alert("¡Publicación copiada exitosamente!");
        };
    </script>
</body>
</html>
